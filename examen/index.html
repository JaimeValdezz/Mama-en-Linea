<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen U1</title>
    <style>
        body {
      margin: 0;
      padding: 0;
      background-color: #000000; 
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    h1 {
      color: white;
      font-family: Arial, sans-serif;
      margin-bottom: 40px;
    }

    .icon-container {
      display: flex;
      gap: 20px;
      justify-content: center;
      align-items: center;
    }

    .icon {
      width: 100px;
      height: 100px;
      border-radius: 100%;
      filter: blur(6px);
      transition: filter 0.3s ease;
      cursor: pointer;
      
    }

    .icon:hover {
      filter: blur(0px);
    }
    </style>
</head>
<body>
     <h1>Examen unidad 1. Camila Vázquez Flores</h1>

    <div class="icon-container">
        <img class="icon" src="Correo icono.svg" alt="Correo electrónico" id="icon1">
        <img class="icon" src="Instagram icono.svg" alt="Instagram" id="icon2">
        <img class="icon" src="Whatsapp icono.svg" alt="Whatsapp" id="icon3">
    </div>

    <script>
        document.querySelectorAll(".icon").forEach(icon => {
      icon.addEventListener("click", () => {
        alert("Has hecho clic en: " + icon.alt);
      });
    });
    </script>  
</body>
</html>
